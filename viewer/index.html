<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eval360 — Model Diagnostics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* ===================================================================
   DESIGN TOKENS
   =================================================================== */
:root {
  --bg:         #0a0e14;
  --bg-raised:  #0f1319;
  --surface:    #141a22;
  --surface-2:  #1a212b;
  --border:     #1e2733;
  --border-2:   #2a3444;
  --text:       #d4dce8;
  --text-bright:#f0f4f8;
  --muted:      #6b7a8d;
  --accent:     #4facfe;
  --accent-dim: rgba(79,172,254,0.12);
  --green:      #34d399;
  --green-dim:  rgba(52,211,153,0.12);
  --red:        #f87171;
  --red-dim:    rgba(248,113,113,0.12);
  --amber:      #fbbf24;
  --amber-dim:  rgba(251,191,36,0.12);
  --teal:       #2dd4bf;
  --radius:     6px;
  --radius-lg:  10px;
  --font-body:  'Outfit', sans-serif;
  --font-mono:  'JetBrains Mono', monospace;
  --shadow:     0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --shadow-lg:  0 4px 12px rgba(0,0,0,0.5);
}

/* ===================================================================
   RESET & BASE
   =================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  background-image: radial-gradient(ellipse at 50% 0%, rgba(79,172,254,0.03) 0%, transparent 60%);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ===================================================================
   NAV
   =================================================================== */
nav {
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  height: 52px;
  gap: 28px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.nav-brand {
  font-weight: 700;
  font-size: 15px;
  color: var(--text-bright);
  text-decoration: none;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-brand::before {
  content: '';
  display: inline-block;
  width: 18px; height: 18px;
  background: linear-gradient(135deg, var(--accent), var(--teal));
  border-radius: 4px;
}

.nav-tabs { display: flex; gap: 2px; }

.nav-tab {
  padding: 6px 14px;
  border-radius: var(--radius);
  color: var(--muted);
  text-decoration: none;
  font-weight: 500;
  font-size: 13px;
  transition: all 0.15s ease;
}

.nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); text-decoration: none; }
.nav-tab.active { color: var(--accent); background: var(--accent-dim); }

/* ===================================================================
   LAYOUT
   =================================================================== */
main {
  max-width: 1440px;
  margin: 0 auto;
  padding: 28px 28px 60px;
}

.page-enter {
  animation: fadeUp 0.25s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===================================================================
   SUMMARY STATS BAR
   =================================================================== */
.stats-bar {
  display: flex;
  gap: 24px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.stat-value {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 22px;
  color: var(--text-bright);
}

.stat-label {
  font-size: 13px;
  color: var(--muted);
  font-weight: 400;
}

/* ===================================================================
   SECTION HEADINGS
   =================================================================== */
.section-head {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* ===================================================================
   HEATMAP
   =================================================================== */
.heatmap-wrap {
  overflow-x: auto;
  margin-bottom: 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface);
}

.heatmap {
  border-collapse: collapse;
  width: 100%;
  min-width: 700px;
}

.heatmap th, .heatmap td {
  padding: 10px 14px;
  font-size: 13px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.heatmap thead th {
  background: var(--bg-raised);
  color: var(--muted);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.heatmap tbody tr:last-child td { border-bottom: none; }
.heatmap tbody tr:hover { background: rgba(255,255,255,0.02); }

.heatmap .model-cell {
  text-align: left;
  font-weight: 500;
  color: var(--text-bright);
  cursor: pointer;
  min-width: 160px;
}

.heatmap .model-cell:hover { color: var(--accent); }

.heatmap .type-separator td {
  background: var(--bg);
  padding: 4px 14px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.score-cell {
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
  border-radius: 3px;
  transition: transform 0.1s ease;
}

.score-cell:hover { transform: scale(1.08); }

.score-cell.best-in-col {
  font-weight: 700;
  box-shadow: inset 0 0 0 1.5px currentColor;
}

/* ===================================================================
   BADGES
   =================================================================== */
.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  display: inline-block;
}

.badge-training { background: var(--green-dim); color: var(--green); }
.badge-baseline { background: var(--amber-dim); color: var(--amber); }

/* ===================================================================
   CARD GRID (Models list)
   =================================================================== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 14px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
}

.card:hover {
  border-color: var(--border-2);
  box-shadow: var(--shadow);
  transform: translateY(-1px);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.card-name { font-weight: 600; font-size: 15px; color: var(--text-bright); }
.card-meta { color: var(--muted); font-size: 12px; margin-bottom: 12px; }

.card-scores {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.card-score-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 3px 8px;
  font-size: 11px;
}

.card-score-chip .ds-name { color: var(--muted); }

.card-score-chip .ds-val {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 11px;
}

/* ===================================================================
   MODEL DETAIL
   =================================================================== */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 18px;
  transition: color 0.15s;
}

.back-link:hover { color: var(--accent); text-decoration: none; }

.detail-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 16px;
}

.detail-title-group {}

.detail-title-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 4px;
}

.detail-title-row h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.5px;
}

.detail-meta { color: var(--muted); font-size: 13px; }

/* ===================================================================
   DIAGNOSTIC PANELS (2-column: radar + gap analysis)
   =================================================================== */
.diag-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 28px;
}

@media (max-width: 960px) { .diag-grid { grid-template-columns: 1fr; } }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

.panel-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--muted);
  margin-bottom: 16px;
}

/* Delta bar chart (replaces radar) */
.delta-bar-wrap { position: relative; height: 320px; }

/* Checkpoint info strip */
.ckpt-strip {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 20px;
  font-family: var(--font-mono);
}
.ckpt-strip .ckpt-item { white-space: nowrap; }
.ckpt-strip .ckpt-sep { color: var(--border-2); }
.ckpt-strip .ckpt-val { color: var(--text-bright); font-weight: 600; }

/* Provenance tooltip */
.provenance-tooltip {
  position: fixed;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 12px;
  max-width: 320px;
  z-index: 200;
  pointer-events: none;
  display: none;
  box-shadow: var(--shadow-lg);
}
.provenance-tooltip .tt-row { display: flex; gap: 8px; margin-bottom: 3px; }
.provenance-tooltip .tt-label { color: var(--muted); min-width: 80px; }
.provenance-tooltip .tt-value { color: var(--text); font-family: var(--font-mono); font-size: 11px; }

/* Gap analysis table */
.gap-table { width: 100%; border-collapse: collapse; }

.gap-table th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
}

.gap-table td {
  padding: 8px 10px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.gap-table tbody tr:last-child td { border-bottom: none; }

.gap-value {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 13px;
}

.gap-positive { color: var(--green); }
.gap-negative { color: var(--red); }
.gap-neutral  { color: var(--muted); }

.trend-icon { font-size: 14px; }
.trend-up        { color: var(--green); }
.trend-up_slow   { color: var(--green); opacity: 0.7; }
.trend-down      { color: var(--red); }
.trend-down_slow { color: var(--red); opacity: 0.7; }
.trend-flat      { color: var(--muted); }
.trend-new       { color: var(--accent); }

/* ===================================================================
   COMPARE CONTROLS
   =================================================================== */
.compare-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.compare-bar label { color: var(--muted); font-size: 13px; font-weight: 500; }

select {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 10px;
  font-size: 13px;
  font-family: var(--font-body);
  outline: none;
  transition: border-color 0.15s;
}

select:focus { border-color: var(--accent); }
select option { background: var(--surface); }

.btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: var(--radius);
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.15s;
}

.btn:hover { opacity: 0.9; box-shadow: 0 0 12px rgba(79,172,254,0.3); }

.btn-danger {
  background: transparent;
  color: var(--red);
  border: 1px solid rgba(248,113,113,0.3);
  font-size: 12px;
  padding: 5px 12px;
}

.btn-danger:hover { background: var(--red-dim); box-shadow: none; opacity: 1; }

.confirm-dialog {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 200;
}

.confirm-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 24px; max-width: 400px; width: 90%;
}

.confirm-box h3 { margin-bottom: 8px; color: var(--text-bright); }
.confirm-box p { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

.confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }

.btn-cancel {
  background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 6px 16px; font-size: 13px; cursor: pointer;
}

.btn-confirm-delete {
  background: var(--red); color: #fff; border: none; border-radius: var(--radius);
  padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
}

.btn-confirm-delete:hover { opacity: 0.9; }

/* ===================================================================
   CHART GRID
   =================================================================== */
.chart-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

@media (max-width: 860px) { .chart-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
}

.chart-card h3 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}

.chart-wrap { position: relative; height: 210px; }

/* ===================================================================
   LEADERBOARD PIVOT
   =================================================================== */
.pivot-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface);
}

.pivot {
  border-collapse: collapse;
  width: 100%;
  min-width: 800px;
}

.pivot th, .pivot td {
  padding: 10px 14px;
  font-size: 13px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.pivot thead th {
  background: var(--bg-raised);
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.pivot .model-col {
  text-align: left;
  font-weight: 500;
  color: var(--text-bright);
  min-width: 180px;
}

.pivot tbody tr:last-child td { border-bottom: none; }
.pivot tbody tr:hover { background: rgba(255,255,255,0.02); }

/* ===================================================================
   UTILITIES
   =================================================================== */
.loading {
  text-align: center;
  padding: 48px 0;
  color: var(--muted);
  font-size: 14px;
}

.error-msg {
  background: var(--red-dim);
  border: 1px solid rgba(248,113,113,0.3);
  color: var(--red);
  border-radius: var(--radius);
  padding: 12px 16px;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}

.stagger-1 { animation-delay: 0.03s; }
.stagger-2 { animation-delay: 0.06s; }
.stagger-3 { animation-delay: 0.09s; }
.stagger-4 { animation-delay: 0.12s; }
.stagger-5 { animation-delay: 0.15s; }
.stagger-6 { animation-delay: 0.18s; }

/* ===================================================================
   EXAMPLE BROWSER (Phase 4)
   =================================================================== */
.example-browser {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-top: 20px;
}

.example-browser-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
}

.example-browser-header h3 { font-size: 16px; font-weight: 600; color: var(--text-bright); }

.example-summary { font-size: 13px; color: var(--muted); }
.example-summary strong { color: var(--text); font-family: var(--font-mono); }

.example-filter-bar {
  display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}

.filter-btn {
  padding: 4px 12px; border-radius: var(--radius); font-size: 12px;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--border-2); color: var(--text); }
.filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

.example-table { width: 100%; border-collapse: collapse; }
.example-table th {
  text-align: left; font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.4px; padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}
.example-table td { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: top; }
.example-table tbody tr { cursor: pointer; transition: background 0.1s; }
.example-table tbody tr:hover { background: rgba(255,255,255,0.02); }
.example-table .correct-cell { color: var(--green); }
.example-table .incorrect-cell { color: var(--red); }
.example-table .preview-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); font-size: 12px; }

.example-expand {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; margin: 4px 0 8px; font-size: 12px; line-height: 1.6;
}
.example-expand .ex-label { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
.example-expand .ex-text { color: var(--text); font-family: var(--font-mono); font-size: 11px; white-space: pre-wrap; word-break: break-word; margin-bottom: 10px; }

.slice-panel { margin-top: 16px; }
.slice-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 12px; }
.slice-bar-label { min-width: 100px; color: var(--muted); text-align: right; }
.slice-bar-track { flex: 1; height: 18px; background: var(--bg); border-radius: 3px; overflow: hidden; display: flex; }
.slice-bar-correct { background: var(--green); opacity: 0.7; height: 100%; }
.slice-bar-incorrect { background: var(--red); opacity: 0.7; height: 100%; }
.slice-bar-stats { min-width: 80px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

.example-pagination { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
.page-btn { padding: 4px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; }
.page-btn:hover { border-color: var(--border-2); color: var(--text); }
.page-btn:disabled { opacity: 0.3; cursor: default; }

.close-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius); padding: 4px 12px; font-size: 12px; cursor: pointer; }
.close-btn:hover { color: var(--text); border-color: var(--border-2); }

/* ===================================================================
   PHASE 5: ACTIVITY FEED, ALERTS, PROMOTION, DIFF
   =================================================================== */
.activity-feed { display: flex; flex-direction: column; gap: 8px; }
.activity-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); transition: border-color 0.15s;
}
.activity-item:hover { border-color: var(--border-2); }
.activity-icon {
  width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px;
}
.activity-icon.regression { background: var(--red-dim); color: var(--red); }
.activity-icon.improvement { background: var(--green-dim); color: var(--green); }
.activity-icon.eval_completed { background: var(--accent-dim); color: var(--accent); }
.activity-body { flex: 1; min-width: 0; }
.activity-summary { font-size: 13px; color: var(--text); }
.activity-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

.alert-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px;
  font-size: 10px; font-weight: 700; color: #fff;
}
.alert-badge.critical { background: var(--red); }
.alert-badge.warning { background: var(--amber); color: #000; }

.promotion-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
  border-radius: var(--radius); font-size: 11px; font-weight: 600;
}
.promotion-badge.ready { background: var(--green-dim); color: var(--green); }
.promotion-badge.blocked { background: var(--red-dim); color: var(--red); }
.promotion-badge.no_rules { background: rgba(255,255,255,0.05); color: var(--muted); }
.promotion-badge.no_data { background: rgba(255,255,255,0.05); color: var(--muted); }

.diff-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
.diff-table th, .diff-table td {
  padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.diff-table th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; }
.diff-positive { color: var(--green); }
.diff-negative { color: var(--red); }
.diff-neutral { color: var(--muted); }

.filter-bar-activity {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}
.filter-bar-activity select, .filter-bar-activity input {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  border-radius: var(--radius); padding: 6px 10px; font-size: 12px; font-family: var(--font-body);
}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="#observatory">Eval360</a>
  <div class="nav-tabs">
    <a class="nav-tab" href="#observatory" data-tab="observatory">Observatory</a>
    <a class="nav-tab" href="#models" data-tab="models">Models</a>
    <a class="nav-tab" href="#leaderboard" data-tab="leaderboard">Leaderboard</a>
    <a class="nav-tab" href="#activity" data-tab="activity">Activity</a>
  </div>
</nav>

<main id="app">
  <div class="loading">Loading...</div>
</main>

<div class="provenance-tooltip" id="provTooltip"></div>

<script>
/* ===================================================================
   COLOR SYSTEM
   =================================================================== */
const PALETTE = [
  '#4facfe','#34d399','#fbbf24','#f87171','#a78bfa',
  '#38bdf8','#f472b6','#fb923c','#2dd4bf','#818cf8',
];
const _colorMap = new Map();
let _colorIdx = 0;

function modelColor(id) {
  if (!_colorMap.has(id)) { _colorMap.set(id, PALETTE[_colorIdx++ % PALETTE.length]); }
  return _colorMap.get(id);
}

function scoreColor(v) {
  if (v == null) return 'var(--muted)';
  const hue = Math.round(v * 140);
  return `hsl(${hue}, 65%, 55%)`;
}

function scoreBg(v) {
  if (v == null) return 'transparent';
  const hue = Math.round(v * 140);
  return `hsla(${hue}, 65%, 55%, 0.12)`;
}

function gapClass(gap) {
  if (gap == null) return 'gap-neutral';
  if (gap > 0.005) return 'gap-positive';
  if (gap < -0.005) return 'gap-negative';
  return 'gap-neutral';
}

function trendIcon(t) {
  const map = { up: '\u2191', up_slow: '\u2197', flat: '\u2192', down_slow: '\u2198', down: '\u2193', new: '\u2022' };
  return map[t] || '\u2022';
}

function formatParams(n) {
  if (!n) return null;
  if (n >= 1e12) return (n/1e12).toFixed(1) + 'T';
  if (n >= 1e9) return (n/1e9).toFixed(0) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(0) + 'M';
  return String(n);
}

/* ===================================================================
   CHART MANAGEMENT
   =================================================================== */
let _charts = [];
function destroyCharts() { _charts.forEach(c => { try { c.destroy(); } catch(_){} }); _charts = []; }

/* Chart.js defaults */
Chart.defaults.font.family = "'Outfit', sans-serif";
Chart.defaults.color = '#6b7a8d';

/* ===================================================================
   DOM HELPERS
   =================================================================== */
function clearNode(n) { while (n.firstChild) n.removeChild(n.firstChild); }

function el(tag, attrs, text) {
  const e = document.createElement(tag);
  if (attrs) for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else e.setAttribute(k, v);
  }
  if (text != null) e.textContent = text;
  return e;
}

function makeBadge(t) {
  const labels = { training: 'developing', baseline: 'reference' };
  const label = labels[t] || t;
  return el('span', {class: 'badge badge-' + t}, label);
}

function showDeleteConfirm(modelId, displayName) {
  const overlay = el('div', {class: 'confirm-dialog'});
  const box = el('div', {class: 'confirm-box'});
  box.appendChild(el('h3', null, 'Delete ' + displayName + '?'));
  box.appendChild(el('p', null, 'This will permanently delete the model, all its checkpoints, and all eval results. This cannot be undone.'));

  const actions = el('div', {class: 'confirm-actions'});
  const cancelBtn = el('button', {class: 'btn-cancel'}, 'Cancel');
  const confirmBtn = el('button', {class: 'btn-confirm-delete'}, 'Delete');

  cancelBtn.addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  confirmBtn.addEventListener('click', async () => {
    confirmBtn.textContent = 'Deleting...';
    confirmBtn.disabled = true;
    try {
      const token = prompt('Enter ingest token to confirm deletion:');
      if (!token) { overlay.remove(); return; }
      const r = await fetch(BASE_PATH + '/api/models/' + encodeURIComponent(modelId), {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token },
      });
      if (r.ok) {
        overlay.remove();
        location.hash = '#models';
      } else {
        const d = await r.json().catch(() => ({}));
        confirmBtn.textContent = d.error || 'Failed (' + r.status + ')';
        setTimeout(() => { confirmBtn.textContent = 'Delete'; confirmBtn.disabled = false; }, 2000);
      }
    } catch (e) {
      confirmBtn.textContent = 'Error';
      setTimeout(() => { confirmBtn.textContent = 'Delete'; confirmBtn.disabled = false; }, 2000);
    }
  });

  actions.appendChild(cancelBtn);
  actions.appendChild(confirmBtn);
  box.appendChild(actions);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

/* ===================================================================
   PROVENANCE TOOLTIP
   =================================================================== */
const _provenanceCache = new Map();

async function fetchProvenance(evalRunId) {
  if (_provenanceCache.has(evalRunId)) return _provenanceCache.get(evalRunId);
  try {
    const data = await api('/api/eval-runs/' + encodeURIComponent(evalRunId));
    _provenanceCache.set(evalRunId, data);
    return data;
  } catch (e) {
    return null;
  }
}

function showProvTooltip(cell, evalRunId, status) {
  const tt = document.getElementById('provTooltip');
  fetchProvenance(evalRunId).then(data => {
    if (!data) return;
    let html = '';
    if (status === 'failed' && data.error_message) {
      html = '<div class="tt-row"><span class="tt-label">Error</span><span class="tt-value" style="color:var(--red)">' + escHtml(data.error_message) + '</span></div>';
    } else {
      if (data.grader_type) html += '<div class="tt-row"><span class="tt-label">Grader</span><span class="tt-value">' + escHtml(data.grader_type + (data.grader_version ? ' v' + data.grader_version : '')) + '</span></div>';
      if (data.sample_count != null) html += '<div class="tt-row"><span class="tt-label">Samples</span><span class="tt-value">' + data.sample_count + '</span></div>';
      if (data.inference_config && Object.keys(data.inference_config).length > 0) {
        const summary = Object.entries(data.inference_config).map(([k,v]) => k + '=' + v).join(', ');
        html += '<div class="tt-row"><span class="tt-label">Inference</span><span class="tt-value">' + escHtml(summary) + '</span></div>';
      }
      if (data.dataset_version) html += '<div class="tt-row"><span class="tt-label">Version</span><span class="tt-value">' + escHtml(data.dataset_version) + '</span></div>';
      if (data.dataset_split) html += '<div class="tt-row"><span class="tt-label">Split</span><span class="tt-value">' + escHtml(data.dataset_split) + '</span></div>';
      if (data.ingested_at) html += '<div class="tt-row"><span class="tt-label">Ingested</span><span class="tt-value">' + escHtml(data.ingested_at) + '</span></div>';
    }
    if (!html) html = '<div class="tt-row"><span class="tt-value">No provenance data</span></div>';
    tt.innerHTML = html;
    const rect = cell.getBoundingClientRect();
    tt.style.left = Math.min(rect.left, window.innerWidth - 340) + 'px';
    tt.style.top = (rect.bottom + 6) + 'px';
    tt.style.display = 'block';
  });
}

function hideProvTooltip() {
  document.getElementById('provTooltip').style.display = 'none';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ===================================================================
   SCORE CELL RENDERING (state-aware)
   =================================================================== */
function renderScoreCell(td, entry, bestVal, dsName) {
  td.className = 'score-cell';
  if (!entry) {
    // Not run
    td.textContent = '\u2014';
    td.style.color = 'var(--muted)';
    return;
  }
  const status = entry.status || 'completed';
  const v = entry.score;
  if (status === 'completed' && v != null) {
    td.textContent = v.toFixed(2);
    td.style.color = scoreColor(v);
    td.style.background = scoreBg(v);
    if (bestVal != null && Math.abs(v - bestVal) < 0.0001) td.classList.add('best-in-col');
    if (entry.eval_run_id) {
      td.dataset.evalRunId = entry.eval_run_id;
      td.dataset.status = status;
      td.addEventListener('mouseenter', function() { showProvTooltip(this, entry.eval_run_id, status); });
      td.addEventListener('mouseleave', hideProvTooltip);
      // Phase 4: clickable example drilldown
      td.style.cursor = 'pointer';
      td.addEventListener('click', (e) => {
        e.stopPropagation();
        openExampleBrowser(entry.eval_run_id, dsName || '');
      });
    }
  } else if (status === 'pending' || status === 'running') {
    td.textContent = '\u23f3';
    td.style.color = 'var(--accent)';
    td.style.opacity = '0.5';
  } else if (status === 'failed') {
    td.textContent = '\u2717';
    td.style.color = 'var(--red)';
    td.style.opacity = '0.7';
    if (entry.eval_run_id) {
      td.dataset.evalRunId = entry.eval_run_id;
      td.dataset.status = status;
      td.addEventListener('mouseenter', function() { showProvTooltip(this, entry.eval_run_id, status); });
      td.addEventListener('mouseleave', hideProvTooltip);
    }
  } else if (status === 'invalidated') {
    td.textContent = '\u26a0';
    td.style.color = 'var(--amber)';
    td.style.opacity = '0.7';
  } else {
    // Fallback for completed with null score or unknown status
    td.textContent = '\u2014';
    td.style.color = 'var(--muted)';
  }
}

// Detect base path: if served at /eval360/, API calls need /eval360/api/...
const BASE_PATH = (() => {
  const p = window.location.pathname;
  // Match /eval360/ or /rl360/ or any subpath prefix before the hash
  const m = p.match(/^(\/[^/]+\/)/);
  return m ? m[1].replace(/\/$/, '') : '';
})();

async function api(path) {
  const r = await fetch(BASE_PATH + path);
  if (!r.ok) throw new Error('API error: ' + r.status);
  return r.json();
}

/* ===================================================================
   EXAMPLE BROWSER (Phase 4)
   =================================================================== */
async function openExampleBrowser(evalRunId, datasetName) {
  // Remove any existing browser
  const existing = document.querySelector('.example-browser');
  if (existing) existing.remove();

  let currentOffset = 0;
  const PAGE_SIZE = 50;
  let currentFilter = null;       // null = all, true = correct, false = incorrect
  let currentTopic = '';
  let currentDifficulty = '';
  let sliceData = null;
  let exData = null;

  const browser = el('div', {class: 'example-browser page-enter'});

  // Header
  const header = el('div', {class: 'example-browser-header'});
  header.appendChild(el('h3', null, datasetName + ' \u2014 Examples'));
  const closeBtn = el('button', {class: 'close-btn'}, '\u2715 Close');
  closeBtn.addEventListener('click', () => browser.remove());
  header.appendChild(closeBtn);
  browser.appendChild(header);

  // Summary placeholder
  const summary = el('div', {class: 'example-summary'});
  summary.textContent = 'Loading...';
  browser.appendChild(summary);

  // Filter bar
  const filterBar = el('div', {class: 'example-filter-bar'});
  const btnAll = el('button', {class: 'filter-btn active'}, 'All');
  const btnCorrect = el('button', {class: 'filter-btn'}, 'Correct');
  const btnIncorrect = el('button', {class: 'filter-btn'}, 'Incorrect');

  function setFilterActive(btn) {
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  btnAll.addEventListener('click', () => { currentFilter = null; currentOffset = 0; setFilterActive(btnAll); fetchAndRender(); });
  btnCorrect.addEventListener('click', () => { currentFilter = true; currentOffset = 0; setFilterActive(btnCorrect); fetchAndRender(); });
  btnIncorrect.addEventListener('click', () => { currentFilter = false; currentOffset = 0; setFilterActive(btnIncorrect); fetchAndRender(); });

  filterBar.appendChild(btnAll);
  filterBar.appendChild(btnCorrect);
  filterBar.appendChild(btnIncorrect);

  // Topic dropdown
  const topicSelect = document.createElement('select');
  topicSelect.appendChild(el('option', {value: ''}, 'All Topics'));
  topicSelect.addEventListener('change', () => { currentTopic = topicSelect.value; currentOffset = 0; fetchAndRender(); });
  filterBar.appendChild(topicSelect);

  // Difficulty dropdown
  const diffSelect = document.createElement('select');
  diffSelect.appendChild(el('option', {value: ''}, 'All Difficulties'));
  diffSelect.addEventListener('change', () => { currentDifficulty = diffSelect.value; currentOffset = 0; fetchAndRender(); });
  filterBar.appendChild(diffSelect);

  browser.appendChild(filterBar);

  // Table container
  const tableContainer = el('div');
  browser.appendChild(tableContainer);

  // Pagination
  const pagination = el('div', {class: 'example-pagination'});
  const prevBtn = el('button', {class: 'page-btn'}, 'Previous');
  const nextBtn = el('button', {class: 'page-btn'}, 'Next');
  prevBtn.addEventListener('click', () => { if (currentOffset >= PAGE_SIZE) { currentOffset -= PAGE_SIZE; fetchAndRender(); } });
  nextBtn.addEventListener('click', () => { if (exData && currentOffset + PAGE_SIZE < exData.total) { currentOffset += PAGE_SIZE; fetchAndRender(); } });
  pagination.appendChild(prevBtn);
  pagination.appendChild(nextBtn);
  browser.appendChild(pagination);

  // Slice panel placeholder
  const slicePanel = el('div', {class: 'slice-panel'});
  browser.appendChild(slicePanel);

  // Insert into DOM
  document.getElementById('app').appendChild(browser);
  browser.scrollIntoView({behavior: 'smooth', block: 'start'});

  // Build query params
  function buildQuery() {
    let q = '/api/eval-runs/' + encodeURIComponent(evalRunId) + '/examples?limit=' + PAGE_SIZE + '&offset=' + currentOffset;
    if (currentFilter === true) q += '&correct=true';
    else if (currentFilter === false) q += '&correct=false';
    if (currentTopic) q += '&topic=' + encodeURIComponent(currentTopic);
    if (currentDifficulty) q += '&difficulty=' + encodeURIComponent(currentDifficulty);
    return q;
  }

  // Render example table
  function renderTable(examples) {
    tableContainer.innerHTML = '';
    if (!examples || examples.length === 0) {
      tableContainer.appendChild(el('div', {class: 'empty-state'}, 'No examples found for current filters.'));
      return;
    }
    const table = document.createElement('table');
    table.className = 'example-table';

    const thead = document.createElement('thead');
    const hrow = document.createElement('tr');
    ['#', 'Input', 'Output', 'Expected', 'Result', 'Topic', 'Difficulty'].forEach(c => hrow.appendChild(el('th', null, c)));
    thead.appendChild(hrow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    for (const ex of examples) {
      const tr = document.createElement('tr');

      tr.appendChild(el('td', null, String(ex.example_idx)));
      tr.appendChild(el('td', {class: 'preview-cell'}, ex.input_preview || '\u2014'));
      tr.appendChild(el('td', {class: 'preview-cell'}, ex.output_preview || '\u2014'));
      tr.appendChild(el('td', {class: 'preview-cell'}, ex.ground_truth || '\u2014'));

      const resultTd = el('td', {class: ex.correct ? 'correct-cell' : 'incorrect-cell'});
      resultTd.textContent = ex.correct ? '\u2713' : '\u2717';
      tr.appendChild(resultTd);

      tr.appendChild(el('td', {style: 'color:var(--muted);font-size:12px'}, ex.topic || '\u2014'));
      tr.appendChild(el('td', {style: 'color:var(--muted);font-size:12px'}, ex.difficulty || '\u2014'));

      // Expand on click
      let expandRow = null;
      tr.addEventListener('click', () => {
        if (expandRow) {
          expandRow.remove();
          expandRow = null;
          return;
        }
        expandRow = document.createElement('tr');
        const expandTd = document.createElement('td');
        expandTd.colSpan = 7;
        const expandDiv = el('div', {class: 'example-expand'});

        if (ex.input_preview) {
          expandDiv.appendChild(el('div', {class: 'ex-label'}, 'Input'));
          expandDiv.appendChild(el('div', {class: 'ex-text'}, ex.input_preview));
        }
        if (ex.output_preview) {
          expandDiv.appendChild(el('div', {class: 'ex-label'}, 'Output'));
          expandDiv.appendChild(el('div', {class: 'ex-text'}, ex.output_preview));
        }
        if (ex.ground_truth) {
          expandDiv.appendChild(el('div', {class: 'ex-label'}, 'Ground Truth'));
          expandDiv.appendChild(el('div', {class: 'ex-text'}, ex.ground_truth));
        }
        if (ex.error_tag) {
          expandDiv.appendChild(el('div', {class: 'ex-label'}, 'Error Tag'));
          expandDiv.appendChild(el('div', {class: 'ex-text'}, ex.error_tag));
        }
        if (ex.metadata && Object.keys(ex.metadata).length > 0) {
          expandDiv.appendChild(el('div', {class: 'ex-label'}, 'Metadata'));
          expandDiv.appendChild(el('div', {class: 'ex-text'}, JSON.stringify(ex.metadata, null, 2)));
        }

        expandTd.appendChild(expandDiv);
        expandRow.appendChild(expandTd);
        tr.after(expandRow);
      });

      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    tableContainer.appendChild(table);
  }

  // Render slice bars
  function renderSlices(data) {
    slicePanel.innerHTML = '';
    if (!data) return;

    if (data.error_concentration) {
      const concDiv = el('div', {style: 'font-size:12px;color:var(--muted);margin-bottom:12px;font-style:italic'});
      concDiv.textContent = data.error_concentration;
      slicePanel.appendChild(concDiv);
    }

    function renderBarGroup(title, slices) {
      if (!slices || Object.keys(slices).length === 0) return;
      slicePanel.appendChild(el('div', {style: 'font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;margin-top:12px'}, title));
      const sorted = Object.entries(slices).sort((a, b) => a[0].localeCompare(b[0]));
      for (const [name, info] of sorted) {
        const row = el('div', {class: 'slice-bar-row'});
        row.appendChild(el('div', {class: 'slice-bar-label'}, name));
        const track = el('div', {class: 'slice-bar-track'});
        const correctPct = info.total > 0 ? (info.correct / info.total) * 100 : 0;
        const incorrectPct = 100 - correctPct;
        const correctBar = el('div', {class: 'slice-bar-correct'});
        correctBar.style.width = correctPct + '%';
        const incorrectBar = el('div', {class: 'slice-bar-incorrect'});
        incorrectBar.style.width = incorrectPct + '%';
        track.appendChild(correctBar);
        track.appendChild(incorrectBar);
        row.appendChild(track);
        row.appendChild(el('div', {class: 'slice-bar-stats'}, info.correct + '/' + info.total + ' (' + (info.accuracy * 100).toFixed(1) + '%)'));
        slicePanel.appendChild(row);
      }
    }

    renderBarGroup('By Topic', data.by_topic);
    renderBarGroup('By Difficulty', data.by_difficulty);
  }

  // Populate dropdowns from slice data
  function populateDropdowns(data) {
    if (!data) return;
    if (data.by_topic) {
      for (const t of Object.keys(data.by_topic).sort()) {
        topicSelect.appendChild(el('option', {value: t}, t));
      }
    }
    if (data.by_difficulty) {
      for (const d of Object.keys(data.by_difficulty).sort()) {
        diffSelect.appendChild(el('option', {value: d}, d));
      }
    }
  }

  // Fetch and render
  async function fetchAndRender() {
    try {
      exData = await api(buildQuery());
      summary.textContent = '';
      summary.appendChild(el('strong', null, String(exData.total)));
      summary.appendChild(document.createTextNode(' examples \u2014 '));
      summary.appendChild(el('strong', null, String(exData.correct_count)));
      summary.appendChild(document.createTextNode(' correct \u2014 '));
      summary.appendChild(el('strong', null, (exData.accuracy * 100).toFixed(1) + '%'));
      summary.appendChild(document.createTextNode(' accuracy'));

      renderTable(exData.examples);

      // Update pagination
      prevBtn.disabled = currentOffset === 0;
      nextBtn.disabled = currentOffset + PAGE_SIZE >= exData.total;
    } catch (e) {
      summary.textContent = 'Error loading examples: ' + e.message;
    }
  }

  // Initial load: fetch examples + slices in parallel
  try {
    const [ex, sl] = await Promise.all([
      api(buildQuery()),
      api('/api/eval-runs/' + encodeURIComponent(evalRunId) + '/slices'),
    ]);
    exData = ex;
    sliceData = sl;

    summary.textContent = '';
    summary.appendChild(el('strong', null, String(exData.total)));
    summary.appendChild(document.createTextNode(' examples \u2014 '));
    summary.appendChild(el('strong', null, String(exData.correct_count)));
    summary.appendChild(document.createTextNode(' correct \u2014 '));
    summary.appendChild(el('strong', null, (exData.accuracy * 100).toFixed(1) + '%'));
    summary.appendChild(document.createTextNode(' accuracy'));

    renderTable(exData.examples);
    prevBtn.disabled = currentOffset === 0;
    nextBtn.disabled = currentOffset + PAGE_SIZE >= exData.total;

    populateDropdowns(sliceData);
    renderSlices(sliceData);
  } catch (e) {
    summary.textContent = 'Error loading examples: ' + e.message;
  }
}

/* ===================================================================
   ROUTING
   =================================================================== */
function setTab(name) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
}

async function route() {
  const hash = location.hash || '#observatory';
  const app = document.getElementById('app');
  destroyCharts();
  try {
    if (hash.startsWith('#model/')) {
      const id = decodeURIComponent(hash.slice(7));
      setTab('models');
      await viewModelDetail(app, id);
    } else if (hash === '#models') {
      setTab('models');
      await viewModels(app);
    } else if (hash === '#leaderboard') {
      setTab('leaderboard');
      await viewLeaderboard(app);
    } else if (hash === '#activity') {
      setTab('activity');
      await viewActivity(app);
    } else if (hash.startsWith('#diff/')) {
      const parts = hash.slice(6).split('/');
      setTab('activity');
      await viewDiff(app, decodeURIComponent(parts[0]), decodeURIComponent(parts[1]));
    } else {
      setTab('observatory');
      await viewObservatory(app);
    }
  } catch(e) {
    clearNode(app);
    app.appendChild(el('div', {class:'error-msg'}, e.message));
  }
}

window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', route);

/* ===================================================================
   VIEW: OBSERVATORY (heatmap home)
   =================================================================== */
async function viewObservatory(app) {
  clearNode(app);
  const wrap = el('div', {class:'page-enter'});
  app.appendChild(wrap);

  wrap.appendChild(el('div', {class:'loading'}, 'Loading observatory...'));
  const [initialData, suitesData] = await Promise.all([api('/api/heatmap'), api('/api/suites')]);
  clearNode(wrap);

  // Stats bar
  const statsBar = el('div', {class:'stats-bar'});
  const trainCount = initialData.models.filter(m => m.model_type === 'training').length;
  const baseCount = initialData.models.filter(m => m.model_type === 'baseline').length;
  [[initialData.models.length, 'models'], [trainCount, 'training'], [baseCount, 'baselines'], [initialData.datasets.length, 'benchmarks']].forEach(([v, l]) => {
    const item = el('div', {class:'stat-item'});
    item.appendChild(el('span', {class:'stat-value'}, String(v)));
    item.appendChild(el('span', {class:'stat-label'}, l));
    statsBar.appendChild(item);
  });
  wrap.appendChild(statsBar);

  // Section head with suite selector
  const sectionHead = el('div', {class:'section-head', style:'display:flex;align-items:center;'});
  sectionHead.appendChild(document.createTextNode('Performance Heatmap'));
  const suiteSelect = document.createElement('select');
  suiteSelect.style.cssText = 'margin-left:auto;';
  const allOpt = document.createElement('option');
  allOpt.value = '';
  allOpt.textContent = 'All Benchmarks';
  suiteSelect.appendChild(allOpt);
  for (const s of suitesData.suites) {
    const opt = document.createElement('option');
    opt.value = s.suite_id;
    opt.textContent = s.display_name + ' (' + s.dataset_names.length + ')';
    suiteSelect.appendChild(opt);
  }
  sectionHead.appendChild(suiteSelect);
  wrap.appendChild(sectionHead);

  const heatmapContainer = el('div');
  wrap.appendChild(heatmapContainer);

  function renderObservatoryHeatmap(data) {
    clearNode(heatmapContainer);

    // Build ordered datasets from categories
    const catOrder = Object.keys(data.categories || {}).sort();
    const orderedDatasets = [];
    for (const cat of catOrder) {
      orderedDatasets.push(...(data.categories[cat] || []).sort());
    }
    const categorized = new Set(orderedDatasets);
    for (const ds of data.datasets) {
      if (!categorized.has(ds)) orderedDatasets.push(ds);
    }

    // Find best score per dataset for highlighting
    const bestPerDs = {};
    for (const ds of orderedDatasets) {
      let best = -1;
      for (const m of data.models) {
        const entry = (data.matrix[m.model_id] || {})[ds];
        const v = entry && entry.score != null ? entry.score : null;
        if (v != null && v > best) best = v;
      }
      bestPerDs[ds] = best;
    }

    // Build heatmap table
    const tableWrap = el('div', {class:'heatmap-wrap'});
    const table = document.createElement('table');
    table.className = 'heatmap';

    // Header
    const thead = document.createElement('thead');

    // Category sub-header row
    if (catOrder.length > 0) {
      const catRow = document.createElement('tr');
      catRow.className = 'type-separator';
      const catModelTd = document.createElement('td');
      catModelTd.colSpan = 2;
      catRow.appendChild(catModelTd);
      for (const cat of catOrder) {
        const catTd = document.createElement('td');
        catTd.colSpan = (data.categories[cat] || []).length;
        catTd.textContent = cat;
        catTd.style.cssText = 'text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);';
        catRow.appendChild(catTd);
      }
      // Uncategorized columns
      const uncatCount = orderedDatasets.length - categorized.size + (orderedDatasets.length - [...categorized].length);
      const actualUncat = orderedDatasets.filter(ds => !categorized.has(ds) || !catOrder.some(cat => (data.categories[cat] || []).includes(ds)));
      if (data.datasets.filter(ds => !categorized.has(ds)).length > 0) {
        const uncatTd = document.createElement('td');
        uncatTd.colSpan = data.datasets.filter(ds => !categorized.has(ds)).length;
        catRow.appendChild(uncatTd);
      }
      thead.appendChild(catRow);
    }

    const hRow = document.createElement('tr');
    hRow.appendChild(el('th', {style:'text-align:left'}, 'Model'));
    hRow.appendChild(el('th', null, 'Type'));
    for (const ds of orderedDatasets) hRow.appendChild(el('th', null, ds));
    thead.appendChild(hRow);
    table.appendChild(thead);

    // Body
    const tbody = document.createElement('tbody');
    let lastType = null;

    for (const m of data.models) {
      // Type separator row
      if (m.model_type !== lastType) {
        lastType = m.model_type;
        const sepRow = document.createElement('tr');
        sepRow.className = 'type-separator';
        const sepTd = document.createElement('td');
        sepTd.colSpan = orderedDatasets.length + 2;
        sepTd.textContent = m.model_type === 'training' ? 'Training Models' : 'Baselines';
        sepRow.appendChild(sepTd);
        tbody.appendChild(sepRow);
      }

      const tr = document.createElement('tr');

      // Model name
      const nameTd = document.createElement('td');
      nameTd.className = 'model-cell';
      nameTd.textContent = m.display_name;
      nameTd.addEventListener('click', () => { location.hash = '#model/' + encodeURIComponent(m.model_id); });
      tr.appendChild(nameTd);

      // Type badge
      const typeTd = document.createElement('td');
      typeTd.appendChild(makeBadge(m.model_type));
      tr.appendChild(typeTd);

      // Score cells
      const scores = data.matrix[m.model_id] || {};
      for (const ds of orderedDatasets) {
        const td = document.createElement('td');
        const entry = scores[ds] || null;
        renderScoreCell(td, entry, bestPerDs[ds], ds);
        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }

    table.appendChild(tbody);
    tableWrap.appendChild(table);
    heatmapContainer.appendChild(tableWrap);
  }

  renderObservatoryHeatmap(initialData);

  suiteSelect.addEventListener('change', async () => {
    const suiteId = suiteSelect.value;
    const url = suiteId ? '/api/heatmap?suite_id=' + encodeURIComponent(suiteId) : '/api/heatmap';
    const newData = await api(url);
    renderObservatoryHeatmap(newData);
  });
}

/* ===================================================================
   VIEW: MODELS LIST (with score chips)
   =================================================================== */
async function viewModels(app) {
  clearNode(app);
  const wrap = el('div', {class:'page-enter'});
  app.appendChild(wrap);
  wrap.appendChild(el('div', {class:'loading'}, 'Loading models...'));

  const [modelsData, heatmapData] = await Promise.all([api('/api/models'), api('/api/heatmap')]);
  clearNode(wrap);

  const grid = el('div', {class:'card-grid'});

  for (let i = 0; i < modelsData.models.length; i++) {
    const m = modelsData.models[i];
    const card = el('div', {class:'card page-enter stagger-' + Math.min(i+1, 6)});

    const header = el('div', {class:'card-header'});
    const nameText = (m.is_pinned ? '\ud83d\udccc ' : '') + m.display_name;
    header.appendChild(el('span', {class:'card-name'}, nameText));
    header.appendChild(makeBadge(m.model_type));
    const paramLabel = formatParams(m.param_count);
    if (paramLabel) {
      header.appendChild(el('span', {
        class: 'badge',
        style: 'background:var(--accent-dim);color:var(--accent);margin-left:4px;',
      }, paramLabel));
    }
    const cov = heatmapData.coverage?.[m.model_id];
    if (cov) {
      const covBadge = el('span', {
        class: 'badge',
        style: 'background:' + (cov.evaluated === cov.total ? 'var(--green-dim)' : 'var(--amber-dim)') + ';color:' + (cov.evaluated === cov.total ? 'var(--green)' : 'var(--amber)') + '; margin-left:8px;',
        title: cov.missing.length ? 'Missing: ' + cov.missing.join(', ') : 'All benchmarks evaluated',
      }, cov.evaluated + '/' + cov.total);
      header.appendChild(covBadge);
    }
    card.appendChild(header);

    // Phase 5: Alert badge (loaded async)
    const alertBadgeSpan = el('span');
    header.appendChild(alertBadgeSpan);
    api('/api/alerts?model_id=' + encodeURIComponent(m.model_id) + '&acknowledged=false&severity=critical&limit=1').then(d => {
      const cnt = (d.alerts || []).length;
      if (cnt > 0) {
        alertBadgeSpan.innerHTML = '<span class="alert-badge critical" style="margin-left:6px;" title="Unacknowledged critical regressions">!</span>';
      }
    }).catch(() => {});

    card.appendChild(el('div', {class:'card-meta'},
      'Owner: ' + m.owner + ' \u00b7 ' + m.checkpoint_count + ' checkpoints \u00b7 ' + m.dataset_count + ' datasets'));

    // Score preview chips
    const scores = heatmapData.matrix[m.model_id] || {};
    const chipWrap = el('div', {class:'card-scores'});
    const entries = Object.entries(scores).sort((a,b) => a[0].localeCompare(b[0])).slice(0, 6);
    for (const [ds, entry] of entries) {
      const v = entry && entry.score != null ? entry.score : null;
      const status = entry ? (entry.status || 'completed') : null;
      const chip = el('div', {class:'card-score-chip'});
      chip.appendChild(el('span', {class:'ds-name'}, ds));
      let valSpan;
      if (status === 'completed' && v != null) {
        valSpan = el('span', {class:'ds-val'}, v.toFixed(2));
        valSpan.style.color = scoreColor(v);
        if (entry.eval_run_id) {
          chip.style.cursor = 'pointer';
          chip.addEventListener('click', (e) => {
            e.stopPropagation();
            openExampleBrowser(entry.eval_run_id, ds);
          });
        }
      } else if (status === 'pending' || status === 'running') {
        valSpan = el('span', {class:'ds-val'}, '\u23f3');
        valSpan.style.color = 'var(--accent)';
        valSpan.style.opacity = '0.5';
      } else if (status === 'failed') {
        valSpan = el('span', {class:'ds-val'}, '\u2717');
        valSpan.style.color = 'var(--red)';
        valSpan.style.opacity = '0.7';
      } else if (status === 'invalidated') {
        valSpan = el('span', {class:'ds-val'}, '\u26a0');
        valSpan.style.color = 'var(--amber)';
        valSpan.style.opacity = '0.7';
      } else {
        valSpan = el('span', {class:'ds-val'}, '\u2014');
        valSpan.style.color = 'var(--muted)';
      }
      chip.appendChild(valSpan);
      chipWrap.appendChild(chip);
    }
    card.appendChild(chipWrap);

    card.addEventListener('click', () => { location.hash = '#model/' + encodeURIComponent(m.model_id); });
    grid.appendChild(card);
  }

  wrap.appendChild(grid);
}

  titleGrp.appendChild(titleRow);
  const stepText = diagData.latest_step ? ' \u00b7 Latest: step ' + diagData.latest_step : '';
  titleGrp.appendChild(el('div', {class:'detail-meta'},
