  hdr.appendChild(titleGrp);
  if (diagData.latest_checkpoint) {
    const latestCp = modelData.checkpoints.find(c => c.checkpoint_id === diagData.latest_checkpoint);
    if (latestCp && latestCp.checkpoint_path) {
      const pathEl = el('div', {style: 'font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:4px;cursor:pointer;', title: 'Click to copy'}, latestCp.checkpoint_path);
      pathEl.addEventListener('click', () => {
        navigator.clipboard.writeText(latestCp.checkpoint_path);
        pathEl.style.color = 'var(--green)';
        setTimeout(() => pathEl.style.color = 'var(--muted)', 1000);
      });
      hdr.appendChild(pathEl);
    }
  }
  wrap.appendChild(hdr);

  // Checkpoint info strip
  const ckptStrip = el('div', {class:'ckpt-strip'});
  if (diagData.latest_step) {
    const latestItem = el('span', {class:'ckpt-item'});
    latestItem.appendChild(document.createTextNode('Latest: step '));
    latestItem.appendChild(el('span', {class:'ckpt-val'}, String(diagData.latest_step)));
    ckptStrip.appendChild(latestItem);
  }
  if (diagData.best_overall_step) {
    ckptStrip.appendChild(el('span', {class:'ckpt-sep'}, '|'));
    const bestItem = el('span', {class:'ckpt-item'});
    bestItem.appendChild(document.createTextNode('Best overall: step '));
    bestItem.appendChild(el('span', {class:'ckpt-val'}, String(diagData.best_overall_step)));
    ckptStrip.appendChild(bestItem);
  }
  if (diagData.best_per_dataset && Object.keys(diagData.best_per_dataset).length > 0) {
    // Show the dataset with the biggest gap (most negative first in sortedDs later, but pick from best_per_dataset)
    const bpd = diagData.best_per_dataset;
    const dsEntries = Object.entries(diagData.scores || {}).sort((a, b) => (a[1].gap || 0) - (b[1].gap || 0));
    const worstDs = dsEntries.length > 0 ? dsEntries[0][0] : Object.keys(bpd).sort()[0];
    if (worstDs && bpd[worstDs]) {
      ckptStrip.appendChild(el('span', {class:'ckpt-sep'}, '|'));
      const dsItem = el('span', {class:'ckpt-item'});
      dsItem.appendChild(document.createTextNode('Best on ' + worstDs + ': step '));
      dsItem.appendChild(el('span', {class:'ckpt-val'}, String(bpd[worstDs])));
      ckptStrip.appendChild(dsItem);
    }
  }
  if (ckptStrip.children.length > 0) wrap.appendChild(ckptStrip);

  // Phase 5: Promotion status + checkpoint diff
  const promotionWrap = el('div', {style:'display:flex; gap:12px; margin-bottom:16px; align-items:flex-start; flex-wrap:wrap;'});
  const promotionBox = el('div', {style:'flex:1; min-width:200px;'});
  renderPromotionBadge(promotionBox, modelId);
  promotionWrap.appendChild(promotionBox);
  // Diff picker: compare two checkpoints
  if (modelData.checkpoints.length >= 2) {
    const diffBox = el('div', {style:'display:flex; gap:6px; align-items:center; font-size:12px;'});
    diffBox.appendChild(el('span', {style:'color:var(--muted);'}, 'Diff:'));
    const selA = el('select', {style:'background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 8px;font-size:11px;font-family:var(--font-body);'});
    const selB = el('select', {style:'background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 8px;font-size:11px;font-family:var(--font-body);'});
    for (const cp of modelData.checkpoints) {
      const label = cp.training_step != null ? 'Step ' + cp.training_step : cp.checkpoint_id;
      selA.appendChild(el('option', {value: cp.checkpoint_id}, label));
      selB.appendChild(el('option', {value: cp.checkpoint_id}, label));
    }
    if (modelData.checkpoints.length >= 2) selB.selectedIndex = modelData.checkpoints.length - 1;
    const diffBtn = el('button', {class:'btn', style:'font-size:11px;padding:4px 10px;'}, 'Compare');
    diffBtn.addEventListener('click', () => {
      location.hash = '#diff/' + encodeURIComponent(selA.value) + '/' + encodeURIComponent(selB.value);
    });
    diffBox.appendChild(selA);
    diffBox.appendChild(el('span', {style:'color:var(--muted);'}, 'vs'));
    diffBox.appendChild(selB);
    diffBox.appendChild(diffBtn);
    promotionWrap.appendChild(diffBox);
  }
  wrap.appendChild(promotionWrap);

  // Diagnostic panels: delta bar chart + gap analysis
  const diagGrid = el('div', {class:'diag-grid'});

  // -- Delta Bar Chart --
  const deltaPanel = el('div', {class:'panel'});
  const deltaPanelTitle = el('div', {class:'panel-title'}, 'Gap Analysis vs Best Baseline');
  deltaPanel.appendChild(deltaPanelTitle);

  // Reference selector
  const refSelectWrap = el('div', {style:'margin-bottom:12px'});
  const refLabel = el('label', {style:'font-size:12px;color:var(--muted);margin-right:8px'}, 'Reference:');
  refSelectWrap.appendChild(refLabel);
  const refSelect = document.createElement('select');
  refSelect.style.fontSize = '12px';
  const defaultRefOpt = document.createElement('option');
  defaultRefOpt.value = '__best_baseline__';
  defaultRefOpt.textContent = 'Best baseline (default)';
  refSelect.appendChild(defaultRefOpt);
  const sizeMatchedOpt = document.createElement('option');
  sizeMatchedOpt.value = '__size_matched__';
  sizeMatchedOpt.textContent = 'Size-matched (\u00b150%)';
  refSelect.appendChild(sizeMatchedOpt);
  for (const m of allModels.models) {
    if (m.model_id === modelId) continue;
    const opt = document.createElement('option');
    opt.value = m.model_id;
    opt.textContent = m.display_name + ' (' + m.model_type + ')';
    refSelect.appendChild(opt);
  }
  refSelectWrap.appendChild(refSelect);
  deltaPanel.appendChild(refSelectWrap);

  const deltaWrap = el('div', {class:'delta-bar-wrap'});
  const deltaCanvas = document.createElement('canvas');
  deltaWrap.appendChild(deltaCanvas);
  deltaPanel.appendChild(deltaWrap);
  diagGrid.appendChild(deltaPanel);

  let deltaChart = null;

  // -- Gap Analysis --
  const gapPanel = el('div', {class:'panel'});
  gapPanel.appendChild(el('div', {class:'panel-title'}, 'Gap Analysis vs Best Baseline'));
  const gapTable = document.createElement('table');
  gapTable.className = 'gap-table';

  const gHead = document.createElement('thead');
  const gHRow = document.createElement('tr');
  ['Benchmark', 'Score', 'Best Baseline', 'Gap', 'Trend', 'Sig.'].forEach(c => gHRow.appendChild(el('th', null, c)));
  gHead.appendChild(gHRow);
  gapTable.appendChild(gHead);

  const gBody = document.createElement('tbody');
  const sortedDs = Object.entries(diagData.scores).sort((a, b) => (a[1].gap || 0) - (b[1].gap || 0));

  for (const [ds, info] of sortedDs) {
    const tr = document.createElement('tr');

    const dsTd = el('td', {style:'font-weight:500;color:var(--text-bright)'});
    dsTd.appendChild(document.createTextNode(ds));
    if (info.metric_name) {
      dsTd.appendChild(document.createTextNode(' '));
      dsTd.appendChild(el('span', {style:'font-weight:400;color:var(--muted);font-size:11px'}, info.metric_name));
    }
    tr.appendChild(dsTd);

    const valTd = el('td', {class:'gap-value'});
    valTd.textContent = info.value.toFixed(4);
    valTd.style.color = scoreColor(info.value);
    if (info.sample_count != null) {
      valTd.appendChild(document.createTextNode(' '));
      valTd.appendChild(el('span', {style:'font-weight:400;color:var(--muted);font-size:10px'}, 'n=' + info.sample_count));
    }
    tr.appendChild(valTd);

    const blTd = document.createElement('td');
    if (info.baseline_best != null) {
      blTd.appendChild(el('span', {class:'gap-value', style:'color:var(--muted)'}, info.baseline_best.toFixed(4)));
      blTd.appendChild(document.createTextNode(' '));
      blTd.appendChild(el('span', {style:'font-size:11px;color:var(--muted)'}, info.baseline_model || ''));
    } else {
      blTd.textContent = '\u2014';
    }
    tr.appendChild(blTd);

    const gapTd = el('td', {class:'gap-value ' + gapClass(info.gap)});
    gapTd.textContent = info.gap != null ? (info.gap > 0 ? '+' : '') + info.gap.toFixed(4) : '\u2014';
    tr.appendChild(gapTd);

    const trendTd = el('td', {class:'trend-icon trend-' + info.trend});
    trendTd.textContent = trendIcon(info.trend);
    tr.appendChild(trendTd);

    const sigTd = el('td', {style: 'text-align:center'});
    const sig = info.significance || 'insufficient_data';
    const sigMap = {
      likely_real: {icon: '\u25cf', class: info.gap >= 0 ? 'gap-positive' : 'gap-negative', tip: 'CIs do not overlap \u2014 likely real'},
      likely_noise: {icon: '~', class: 'gap-neutral', tip: 'CIs overlap significantly \u2014 likely noise'},
      uncertain: {icon: '?', class: 'trend-flat', tip: 'Partial CI overlap \u2014 uncertain'},
      insufficient_data: {icon: '\u2014', class: 'gap-neutral', tip: 'Insufficient data for CI comparison'},
    };
    const s = sigMap[sig] || sigMap.insufficient_data;
    sigTd.textContent = s.icon;
    sigTd.className = s.class;
    sigTd.title = s.tip;
    sigTd.style.cursor = 'help';
    tr.appendChild(sigTd);

    gBody.appendChild(tr);
  }

  gapTable.appendChild(gBody);
  gapPanel.appendChild(gapTable);
  diagGrid.appendChild(gapPanel);
  wrap.appendChild(diagGrid);

  // Render delta bar chart
  function buildDeltaChart(refScores, refName) {
    // refScores: { datasetName: score } for the reference
    const gaps = sortedDs.map(([ds, info]) => {
      const myScore = info.value;
      const refScore = refScores[ds];
      if (refScore == null || myScore == null) return { ds, gap: null, significance: info.significance };
      return { ds, gap: myScore - refScore, significance: info.significance };
    }).filter(g => g.gap != null).sort((a, b) => a.gap - b.gap); // worst first

    if (deltaChart) { deltaChart.destroy(); _charts = _charts.filter(c => c !== deltaChart); }

    deltaPanelTitle.textContent = 'Gap Analysis vs ' + refName;

    const barColors = gaps.map(g => {
      const gap = g.gap || 0;
      const sig = g.significance || 'insufficient_data';
      const alpha = sig === 'likely_noise' ? '66' : sig === 'insufficient_data' ? '99' : 'ff';
      return gap >= 0 ? '#34d399' + alpha : '#f87171' + alpha;
    });

    deltaChart = new Chart(deltaCanvas, {
      type: 'bar',
      data: {
        labels: gaps.map(g => g.ds),
        datasets: [{
          label: 'Gap',
          data: gaps.map(g => g.gap),
          backgroundColor: barColors,
          borderColor: gaps.map(g => g.gap >= 0 ? '#34d399' : '#f87171'),
          borderWidth: 1,
          borderRadius: 3,
        }],
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            grid: { color: '#1e2733' },
            ticks: { color: '#6b7a8d', font: { size: 11, family: 'JetBrains Mono' } },
          },
          y: {
            grid: { display: false },
            ticks: { color: '#8b9bb0', font: { size: 11, family: 'Outfit' } },
          },
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#141a22', borderColor: '#2a3444', borderWidth: 1,
            titleColor: '#f0f4f8', bodyColor: '#8b9bb0',
            callbacks: { label(ctx) { const v = ctx.raw; return (v > 0 ? '+' : '') + v.toFixed(4); } },
          },
        },
      },
    });
    _charts.push(deltaChart);
  }

  // Default: best baseline reference
  const defaultRefScores = {};
  for (const [ds, info] of sortedDs) {
    defaultRefScores[ds] = info.baseline_best;
  }
  buildDeltaChart(defaultRefScores, 'Best Baseline');

  // Reference selector change handler
  refSelect.addEventListener('change', async () => {
    const refId = refSelect.value;
    if (refId === '__best_baseline__') {
      buildDeltaChart(defaultRefScores, 'Best Baseline');
      // Also rebuild gap table with default data
      rebuildGapTable(diagData.scores);
    } else if (refId === '__size_matched__') {
      // Size-matched: find models within +/-50% param_count of primary model
      const primaryParams = model.param_count;
      let sizeMatchedRef = null;
      if (primaryParams) {
        const lo = primaryParams * 0.5;
        const hi = primaryParams * 1.5;
        const candidates = allModels.models.filter(m =>
          m.model_id !== modelId && m.param_count && m.param_count >= lo && m.param_count <= hi
        );
        // Pick candidate with best average score from heatmap
        if (candidates.length > 0) {
          // Fetch heatmap to get average scores
          try {
            const hm = await api('/api/heatmap');
            let bestAvg = -1;
            for (const c of candidates) {
              const scores = hm.matrix[c.model_id] || {};
              const vals = Object.values(scores).map(e => e && e.score != null ? e.score : null).filter(v => v != null);
              const avg = vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : -1;
              if (avg > bestAvg) { bestAvg = avg; sizeMatchedRef = c; }
            }
          } catch (e) {
            // Fallback: pick first candidate
            sizeMatchedRef = candidates[0];
          }
        }
      }
      if (sizeMatchedRef) {
        try {
          const refData = await api('/api/models/' + encodeURIComponent(sizeMatchedRef.model_id) + '/scores');
          const refScores = {};
          const refName = sizeMatchedRef.display_name + ' (size-matched)';
          for (const s of refData.scores) {
            if (s.is_primary) refScores[s.dataset_name] = s.metric_value;
          }
          buildDeltaChart(refScores, refName);
          const newGapData = {};
          for (const [ds, info] of sortedDs) {
            const refVal = refScores[ds];
            const gap = (refVal != null && info.value != null) ? info.value - refVal : null;
            newGapData[ds] = { ...info, baseline_best: refVal, baseline_model: refName, gap };
          }
          rebuildGapTable(newGapData);
        } catch (e) {
          console.error('Failed to fetch size-matched reference scores:', e);
        }
      } else {
        // No size-matched model found, fall back to best baseline
        buildDeltaChart(defaultRefScores, 'Best Baseline (no size match)');
        rebuildGapTable(diagData.scores);
      }
    } else {
      try {
        const refData = await api('/api/models/' + encodeURIComponent(refId) + '/scores');
        const refScores = {};
        const refName = allModels.models.find(m => m.model_id === refId)?.display_name || refId;
        for (const s of refData.scores) {
          if (s.is_primary) refScores[s.dataset_name] = s.metric_value;
        }
        buildDeltaChart(refScores, refName);
        // Rebuild gap table with new reference
        const newGapData = {};
        for (const [ds, info] of sortedDs) {
          const refVal = refScores[ds];
          const gap = (refVal != null && info.value != null) ? info.value - refVal : null;
          newGapData[ds] = { ...info, baseline_best: refVal, baseline_model: refName, gap };
        }
        rebuildGapTable(newGapData);
      } catch (e) {
        console.error('Failed to fetch reference scores:', e);
      }
    }
  });

  // Gap table rebuild function (for reference selector changes)
  function rebuildGapTable(gapData) {
    clearNode(gBody);
    const newSorted = Object.entries(gapData).sort((a, b) => (a[1].gap || 0) - (b[1].gap || 0));
    for (const [ds, info] of newSorted) {
      const tr = document.createElement('tr');

      const dsTd = el('td', {style:'font-weight:500;color:var(--text-bright)'});
      dsTd.appendChild(document.createTextNode(ds));
      if (info.metric_name) {
        dsTd.appendChild(document.createTextNode(' '));
        dsTd.appendChild(el('span', {style:'font-weight:400;color:var(--muted);font-size:11px'}, info.metric_name));
      }
      tr.appendChild(dsTd);

      const valTd = el('td', {class:'gap-value'});
      valTd.textContent = info.value.toFixed(4);
      valTd.style.color = scoreColor(info.value);
      if (info.sample_count != null) {
        valTd.appendChild(document.createTextNode(' '));
        valTd.appendChild(el('span', {style:'font-weight:400;color:var(--muted);font-size:10px'}, 'n=' + info.sample_count));
      }
      tr.appendChild(valTd);

      const blTd = document.createElement('td');
      if (info.baseline_best != null) {
        blTd.appendChild(el('span', {class:'gap-value', style:'color:var(--muted)'}, info.baseline_best.toFixed(4)));
        blTd.appendChild(document.createTextNode(' '));
        blTd.appendChild(el('span', {style:'font-size:11px;color:var(--muted)'}, info.baseline_model || ''));
      } else {
        blTd.textContent = '\u2014';
      }
      tr.appendChild(blTd);

      const gapTd = el('td', {class:'gap-value ' + gapClass(info.gap)});
      gapTd.textContent = info.gap != null ? (info.gap > 0 ? '+' : '') + info.gap.toFixed(4) : '\u2014';
      tr.appendChild(gapTd);

      const trendTd = el('td', {class:'trend-icon trend-' + info.trend});
      trendTd.textContent = trendIcon(info.trend);
      tr.appendChild(trendTd);

      const sigTd = el('td', {style: 'text-align:center'});
      const sig = info.significance || 'insufficient_data';
      const sigMap = {
        likely_real: {icon: '\u25cf', class: info.gap >= 0 ? 'gap-positive' : 'gap-negative', tip: 'CIs do not overlap \u2014 likely real'},
        likely_noise: {icon: '~', class: 'gap-neutral', tip: 'CIs overlap significantly \u2014 likely noise'},
        uncertain: {icon: '?', class: 'trend-flat', tip: 'Partial CI overlap \u2014 uncertain'},
        insufficient_data: {icon: '\u2014', class: 'gap-neutral', tip: 'Insufficient data for CI comparison'},
      };
      const s = sigMap[sig] || sigMap.insufficient_data;
      sigTd.textContent = s.icon;
      sigTd.className = s.class;
      sigTd.title = s.tip;
      sigTd.style.cursor = 'help';
      tr.appendChild(sigTd);

      gBody.appendChild(tr);
    }
  }

  // Compare controls
  const compareBar = el('div', {class:'compare-bar'});
  compareBar.appendChild(el('label', null, 'Compare with...'));
  const compareSelect = document.createElement('select');
  compareSelect.multiple = true;
  compareSelect.size = Math.min(5, Math.max(2, allModels.models.length - 1));
  compareSelect.style.minWidth = '220px';
  for (const m of allModels.models) {
    if (m.model_id === modelId) continue;
    const opt = document.createElement('option');
    opt.value = m.model_id;
    opt.textContent = m.display_name + ' (' + m.model_type + ')';
    compareSelect.appendChild(opt);
  }
  compareBar.appendChild(compareSelect);
  const commonToggle = document.createElement('input');
  commonToggle.type = 'checkbox';
  commonToggle.id = 'common-only';
  const commonLabel = el('label', {for: 'common-only', style: 'color:var(--muted);font-size:12px;cursor:pointer'}, 'Common benchmarks only');
  compareBar.appendChild(commonToggle);
  compareBar.appendChild(commonLabel);
  const updateBtn = el('button', {class:'btn'}, 'Update Charts');
  compareBar.appendChild(updateBtn);
  wrap.appendChild(compareBar);

  // Section head for training curves
  const curvesHead = el('div', {class:'section-head', style:'display:flex;align-items:center;justify-content:space-between'});
  curvesHead.appendChild(document.createTextNode('Training Curves'));
  const bandControls = el('span', {style:'display:flex;align-items:center'});
  const bandToggle = document.createElement('input');
  bandToggle.type = 'checkbox';
  bandToggle.id = 'show-bands';
  const bandLabel = el('label', {for: 'show-bands', style: 'color:var(--muted);font-size:12px;cursor:pointer;margin-left:16px'}, 'Show uncertainty');
  bandControls.appendChild(bandToggle);
  bandControls.appendChild(bandLabel);
  curvesHead.appendChild(bandControls);
  wrap.appendChild(curvesHead);

  // Chart grid
  const chartGrid = el('div', {class:'chart-grid'});
  wrap.appendChild(chartGrid);

  // Build dataset map
  const primaryScores = scoresData.scores.filter(s => s.is_primary);
  const dsMap = new Map();
  for (const s of primaryScores) {
    if (!dsMap.has(s.dataset_name)) dsMap.set(s.dataset_name, []);
    dsMap.get(s.dataset_name).push(s);
  }
  for (const pts of dsMap.values()) pts.sort((a,b) => (a.training_step ?? Infinity) - (b.training_step ?? Infinity));
  const datasets = [...dsMap.keys()].sort();

  // x-range for baselines
  let allSteps = [];
  for (const pts of dsMap.values()) for (const p of pts) if (p.training_step != null) allSteps.push(p.training_step);
  const xMin = allSteps.length ? Math.min(...allSteps) : 0;
  const xMax = allSteps.length ? Math.max(...allSteps) : 1;

  async function renderCurves(compareIds) {
    // Destroy only line charts, keep delta bar chart
    const keep = deltaChart ? [deltaChart] : [];
    _charts.filter(c => !keep.includes(c)).forEach(c => { try { c.destroy(); } catch(_){} });
    _charts = [...keep];
    clearNode(chartGrid);

    const useCommonOnly = commonToggle.checked;
    const showBands = bandToggle.checked;

    let compareByDs = {};
    let commonDatasets = null;
    if (compareIds.length > 0) {
      const allIds = [modelId, ...compareIds].join(',');
      const commonParam = useCommonOnly ? '&common_only=true' : '';
      const results = await Promise.allSettled(
        datasets.map(ds => api('/api/compare?models=' + encodeURIComponent(allIds) + '&dataset=' + encodeURIComponent(ds) + commonParam))
      );
      datasets.forEach((ds, i) => { if (results[i].status === 'fulfilled') compareByDs[ds] = results[i].value; });

      // If common_only, filter to datasets present in compareByDs that have data for all models
      if (useCommonOnly) {
        commonDatasets = new Set();
        for (const [ds, cData] of Object.entries(compareByDs)) {
          if (cData.models && cData.models.length === compareIds.length + 1) {
            commonDatasets.add(ds);
          }
        }
      }
    }

    const renderDs = commonDatasets ? datasets.filter(ds => commonDatasets.has(ds)) : datasets;

    for (const dsName of renderDs) {
      const pts = dsMap.get(dsName) || [];
      const card = el('div', {class:'chart-card'});
      const metricName = (dsMap.get(dsName) || [])[0]?.metric_name || '';
      const titleEl = el('h3', null, dsName);
      if (metricName) {
        titleEl.appendChild(document.createTextNode(' '));
        titleEl.appendChild(el('span', {style:'font-weight:400;color:var(--muted);font-size:11px'}, metricName));
      }
      card.appendChild(titleEl);
      const cw = el('div', {class:'chart-wrap'});
      const canvas = document.createElement('canvas');
      cw.appendChild(canvas);
      card.appendChild(cw);
      chartGrid.appendChild(card);

      const chartDatasets = [];

      if (compareIds.length > 0 && compareByDs[dsName]) {
        for (const mEntry of compareByDs[dsName].models) {
          const color = modelColor(mEntry.model_id);
          if (mEntry.model_type === 'baseline' && mEntry.data_points.length > 0) {
            const val = mEntry.data_points[0].metric_value;
            chartDatasets.push({
              label: mEntry.display_name, data: [{x:xMin,y:val},{x:xMax,y:val}],
              borderColor: color, backgroundColor: color+'22', borderDash:[6,4], borderWidth:1.5,
              pointRadius:0, pointHoverRadius:3, tension:0,
            });
          } else {
            chartDatasets.push({
              label: mEntry.display_name,
              data: mEntry.data_points.map(p => ({x:p.training_step, y:p.metric_value})),
              borderColor: color, backgroundColor: color+'22', borderWidth:2,
              pointRadius:2.5, pointHoverRadius:5, tension:0.3,
            });
            // Error bands for training models
            if (showBands && mEntry.data_points.some(p => p.ci_lower != null && p.ci_upper != null)) {
              chartDatasets.push({
                label: mEntry.display_name + ' CI upper',
                data: mEntry.data_points.filter(p => p.ci_upper != null).map(p => ({x: p.training_step, y: p.ci_upper})),
                borderColor: 'transparent',
                backgroundColor: color + '1a',
                pointRadius: 0,
                fill: '+1',
                borderWidth: 0,
                hidden: false,
                _isCIBand: true,
              });
              chartDatasets.push({
                label: mEntry.display_name + ' CI lower',
                data: mEntry.data_points.filter(p => p.ci_lower != null).map(p => ({x: p.training_step, y: p.ci_lower})),
                borderColor: 'transparent',
                backgroundColor: 'transparent',
                pointRadius: 0,
                borderWidth: 0,
                hidden: false,
                _isCIBand: true,
              });
            }
          }
        }
      } else {
        const color = modelColor(modelId);
        chartDatasets.push({
          label: model.display_name,
          data: pts.map(p => ({x:p.training_step, y:p.metric_value})),
          borderColor: color, backgroundColor: color+'22', borderWidth:2,
          pointRadius:2.5, pointHoverRadius:5, tension:0.3,
        });
        // Error bands for single model view
        if (showBands && pts.some(p => p.ci_lower != null && p.ci_upper != null)) {
          chartDatasets.push({
            label: model.display_name + ' CI upper',
            data: pts.filter(p => p.ci_upper != null).map(p => ({x: p.training_step, y: p.ci_upper})),
            borderColor: 'transparent',
            backgroundColor: color + '1a',
            pointRadius: 0,
            fill: '+1',
            borderWidth: 0,
            hidden: false,
            _isCIBand: true,
          });
          chartDatasets.push({
            label: model.display_name + ' CI lower',
            data: pts.filter(p => p.ci_lower != null).map(p => ({x: p.training_step, y: p.ci_lower})),
            borderColor: 'transparent',
            backgroundColor: 'transparent',
            pointRadius: 0,
            borderWidth: 0,
            hidden: false,
            _isCIBand: true,
          });
        }
      }

      // Auto-scale y-axis
      let yVals = chartDatasets.flatMap(d => d.data.map(p => p.y));
      let yMin = Math.max(0, Math.floor((Math.min(...yVals) - 0.05) * 10) / 10);
      let yMax = Math.min(1, Math.ceil((Math.max(...yVals) + 0.05) * 10) / 10);

      const chart = new Chart(canvas, {
        type: 'line',
        data: { datasets: chartDatasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          animation: { duration: 300 },
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: { type:'linear', ticks:{color:'#6b7a8d', maxTicksLimit:6, font:{size:11}}, grid:{color:'#1e2733'} },
            y: { min:yMin, max:yMax, ticks:{color:'#6b7a8d', maxTicksLimit:5, font:{size:11,family:'JetBrains Mono'}}, grid:{color:'#1e2733'} },
          },
          plugins: {
            legend: {
              labels:{
                color:'#d4dce8', boxWidth:12, font:{size:11},
                filter: function(item, chartData) {
                  return !chartData.datasets[item.datasetIndex]._isCIBand;
                },
              },
            },
            tooltip: {
              backgroundColor:'#141a22', borderColor:'#2a3444', borderWidth:1, titleColor:'#f0f4f8', bodyColor:'#8b9bb0',
              callbacks: { label(ctx) { if (ctx.dataset._isCIBand) return null; const r=ctx.raw; return ctx.dataset.label+': '+r.y.toFixed(4)+(r.x!=null?' (step '+r.x+')':''); } },
              filter: function(tooltipItem) { return !tooltipItem.dataset._isCIBand; },
            },
          },
        },
      });
      _charts.push(chart);
    }
  }

  await renderCurves([]);

  function getSelectedCompareIds() {
    return Array.from(compareSelect.selectedOptions).map(o => o.value);
  }

  updateBtn.addEventListener('click', async () => {
    await renderCurves(getSelectedCompareIds());
  });

  bandToggle.addEventListener('change', async () => {
    await renderCurves(getSelectedCompareIds());
  });
}

/* ===================================================================
   VIEW: LEADERBOARD (pivot heatmap)
   =================================================================== */
async function viewLeaderboard(app) {
  clearNode(app);
  const wrap = el('div', {class:'page-enter'});
  app.appendChild(wrap);
  wrap.appendChild(el('div', {class:'loading'}, 'Loading leaderboard...'));

  const [initialData, suitesData] = await Promise.all([api('/api/heatmap'), api('/api/suites')]);
  clearNode(wrap);

  // Section head with suite selector
  const sectionHead = el('div', {class:'section-head', style:'display:flex;align-items:center;'});
  sectionHead.appendChild(document.createTextNode('All Models \u00d7 All Benchmarks'));
  const lbSuiteSelect = document.createElement('select');
  lbSuiteSelect.style.cssText = 'margin-left:auto;';
  const lbAllOpt = document.createElement('option');
  lbAllOpt.value = '';
  lbAllOpt.textContent = 'All Benchmarks';
  lbSuiteSelect.appendChild(lbAllOpt);
  for (const s of suitesData.suites) {
    const opt = document.createElement('option');
    opt.value = s.suite_id;
    opt.textContent = s.display_name + ' (' + s.dataset_names.length + ')';
    lbSuiteSelect.appendChild(opt);
  }
  sectionHead.appendChild(lbSuiteSelect);
  wrap.appendChild(sectionHead);

  // Sort control
  const sortBar = el('div', {class:'compare-bar'});
  sortBar.appendChild(el('label', null, 'Sort by:'));
  const sortSelect = document.createElement('select');
  sortBar.appendChild(sortSelect);
  wrap.appendChild(sortBar);

  const tableContainer = el('div');
  wrap.appendChild(tableContainer);

  let currentData = initialData;

  function populateSortSelect(data) {
    clearNode(sortSelect);
    const defaultOpt = document.createElement('option');
    defaultOpt.value = '';
    defaultOpt.textContent = 'Default';
    sortSelect.appendChild(defaultOpt);
    // Build ordered datasets from categories
    const catOrder = Object.keys(data.categories || {}).sort();
    const orderedDatasets = [];
    for (const cat of catOrder) {
      orderedDatasets.push(...(data.categories[cat] || []).sort());
    }
    const categorized = new Set(orderedDatasets);
    for (const ds of data.datasets) {
      if (!categorized.has(ds)) orderedDatasets.push(ds);
    }
    for (const ds of orderedDatasets) {
      const opt = document.createElement('option');
      opt.value = ds;
      opt.textContent = ds;
      sortSelect.appendChild(opt);
    }
  }

  function renderPivot(data, sortDs) {
    clearNode(tableContainer);

    // Build ordered datasets from categories
    const catOrder = Object.keys(data.categories || {}).sort();
    const orderedDatasets = [];
    for (const cat of catOrder) {
      orderedDatasets.push(...(data.categories[cat] || []).sort());
    }
    const categorized = new Set(orderedDatasets);
    for (const ds of data.datasets) {
      if (!categorized.has(ds)) orderedDatasets.push(ds);
    }

    // Best per column
    const bestPerDs = {};
    for (const ds of orderedDatasets) {
      let best = -1;
      for (const m of data.models) {
        const entry = (data.matrix[m.model_id] || {})[ds];
        const v = entry && entry.score != null ? entry.score : null;
        if (v != null && v > best) best = v;
      }
      bestPerDs[ds] = best;
    }

    const pivotWrap = el('div', {class:'pivot-wrap'});
    const table = document.createElement('table');
    table.className = 'pivot';

    const thead = document.createElement('thead');

    // Category sub-header row
    if (catOrder.length > 0) {
      const catRow = document.createElement('tr');
      catRow.className = 'type-separator';
      const catModelTd = document.createElement('td');
      catModelTd.colSpan = 2;
      catRow.appendChild(catModelTd);
      for (const cat of catOrder) {
        const catTd = document.createElement('td');
        catTd.colSpan = (data.categories[cat] || []).length;
        catTd.textContent = cat;
        catTd.style.cssText = 'text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);';
        catRow.appendChild(catTd);
      }
      if (data.datasets.filter(ds => !categorized.has(ds)).length > 0) {
        const uncatTd = document.createElement('td');
        uncatTd.colSpan = data.datasets.filter(ds => !categorized.has(ds)).length;
        catRow.appendChild(uncatTd);
      }
      thead.appendChild(catRow);
    }

    const hRow = document.createElement('tr');
    hRow.appendChild(el('th', {style:'text-align:left'}, 'Model'));
    hRow.appendChild(el('th', null, 'Type'));
    for (const ds of orderedDatasets) {
      const th = el('th', null, ds);
      if (ds === sortDs) th.style.color = 'var(--accent)';
      hRow.appendChild(th);
    }
    thead.appendChild(hRow);
    table.appendChild(thead);

    // Sort models
    let sorted = [...data.models];
    if (sortDs) {
      sorted.sort((a, b) => {
        const entryA = (data.matrix[a.model_id] || {})[sortDs];
        const entryB = (data.matrix[b.model_id] || {})[sortDs];
        const va = entryA && entryA.score != null ? entryA.score : -1;
        const vb = entryB && entryB.score != null ? entryB.score : -1;
        return vb - va;
      });
    }

    const tbody = document.createElement('tbody');
    for (const m of sorted) {
      const tr = document.createElement('tr');

      const nameTd = document.createElement('td');
      nameTd.className = 'model-col';
      const link = el('a', {href:'#model/' + encodeURIComponent(m.model_id), style:'color:var(--text-bright);text-decoration:none'}, m.display_name);
      link.addEventListener('mouseover', () => link.style.color = 'var(--accent)');
      link.addEventListener('mouseout', () => link.style.color = 'var(--text-bright)');
      nameTd.appendChild(link);
      tr.appendChild(nameTd);

      const typeTd = document.createElement('td');
      typeTd.appendChild(makeBadge(m.model_type));
      tr.appendChild(typeTd);

      const scores = data.matrix[m.model_id] || {};
      for (const ds of orderedDatasets) {
        const td = document.createElement('td');
        const entry = scores[ds] || null;
        renderScoreCell(td, entry, bestPerDs[ds], ds);
        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }

    table.appendChild(tbody);
    pivotWrap.appendChild(table);
    tableContainer.appendChild(pivotWrap);
  }

  populateSortSelect(initialData);
  renderPivot(initialData, '');
  sortSelect.addEventListener('change', () => renderPivot(currentData, sortSelect.value));

  lbSuiteSelect.addEventListener('change', async () => {
    const suiteId = lbSuiteSelect.value;
    const url = suiteId ? '/api/heatmap?suite_id=' + encodeURIComponent(suiteId) : '/api/heatmap';
    currentData = await api(url);
    populateSortSelect(currentData);
    renderPivot(currentData, '');
  });
}

/* ===================================================================
   VIEW: ACTIVITY FEED
   =================================================================== */
async function viewActivity(app) {
  clearNode(app);
  const wrap = el('div', {class:'page-enter'});
  app.appendChild(wrap);

  wrap.appendChild(el('h2', {class:'section-title'}, 'Activity Feed'));

  // Filter bar
  const filterBar = el('div', {class:'filter-bar-activity'});
  const typeSelect = el('select');
  typeSelect.innerHTML = '<option value="">All events</option><option value="regression">Regressions</option><option value="improvement">Improvements</option><option value="eval_completed">Eval completed</option>';
  filterBar.appendChild(typeSelect);

  const sevSelect = el('select');
  sevSelect.innerHTML = '<option value="">All severity</option><option value="critical">Critical</option><option value="warning">Warning</option><option value="info">Info</option>';
  filterBar.appendChild(sevSelect);
  wrap.appendChild(filterBar);

  // Alerts summary
  const alertSummary = el('div', {style:'margin-bottom: 16px;'});
  wrap.appendChild(alertSummary);

  // Activity list
  const feed = el('div', {class:'activity-feed'});
  wrap.appendChild(feed);

  async function loadActivity() {
    // Load alerts summary
    try {
      const alertData = await api('/api/alerts?acknowledged=false&limit=200');
      const alerts = alertData.alerts || [];
      const critCount = alerts.filter(a => a.severity === 'critical').length;
      const warnCount = alerts.filter(a => a.severity === 'warning').length;
      if (critCount || warnCount) {
        alertSummary.innerHTML = '';
        const box = el('div', {style:'padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; display: flex; gap: 12px; align-items: center;'});
        box.innerHTML = '<span style="font-size:13px; color: var(--text);">Unacknowledged alerts:</span>';
        if (critCount) box.innerHTML += '<span class="alert-badge critical">' + critCount + ' critical</span>';
        if (warnCount) box.innerHTML += '<span class="alert-badge warning">' + warnCount + ' warning</span>';
        alertSummary.appendChild(box);
      }
    } catch(e) {}

    // Load events
    const events = await api('/api/activity?limit=100');
    clearNode(feed);
    const items = events.events || [];
    if (!items.length) {
      feed.appendChild(el('div', {class:'empty-state'}, 'No activity yet.'));
      return;
    }
    for (const evt of items) {
      if (typeSelect.value && evt.event_type !== typeSelect.value) continue;
      const iconClass = evt.event_type === 'regression' ? 'regression' : evt.event_type === 'improvement' ? 'improvement' : 'eval_completed';
      const iconChar = evt.event_type === 'regression' ? '\u2193' : evt.event_type === 'improvement' ? '\u2191' : '\u2022';
      const item = el('div', {class:'activity-item'});
      const icon = el('div', {class:'activity-icon ' + iconClass});
      icon.textContent = iconChar;
      item.appendChild(icon);
      const body = el('div', {class:'activity-body'});
      const summaryEl = el('div', {class:'activity-summary'});
      summaryEl.textContent = evt.summary || '';
      body.appendChild(summaryEl);
      const meta = el('div', {class:'activity-meta'});
      const modelLink = evt.model_id ? '<a href="#model/' + encodeURIComponent(evt.model_id) + '">' + evt.model_id + '</a>' : '';
      meta.innerHTML = [modelLink, evt.dataset_name, evt.event_type].filter(Boolean).join(' \u00B7 ');
      body.appendChild(meta);
      item.appendChild(body);
      // Delta badge
      if (evt.detail && evt.detail.delta != null) {
        const delta = evt.detail.delta;
        const cls = delta > 0 ? 'diff-positive' : delta < 0 ? 'diff-negative' : 'diff-neutral';
        const badge = el('span', {class: cls, style:'font-family: var(--font-mono); font-size: 12px; white-space: nowrap;'});
        badge.textContent = (delta > 0 ? '+' : '') + delta.toFixed(4);
        item.appendChild(badge);
      }
      feed.appendChild(item);
    }
  }

  typeSelect.addEventListener('change', loadActivity);
  sevSelect.addEventListener('change', loadActivity);
  await loadActivity();
}

/* ===================================================================
   VIEW: CHECKPOINT DIFF
   =================================================================== */
async function viewDiff(app, cpA, cpB) {
  clearNode(app);
  const wrap = el('div', {class:'page-enter'});
  app.appendChild(wrap);

  const data = await api('/api/diff?checkpoint_a=' + encodeURIComponent(cpA) + '&checkpoint_b=' + encodeURIComponent(cpB));

  const stepA = data.checkpoint_a.training_step;
  const stepB = data.checkpoint_b.training_step;
  wrap.appendChild(el('h2', {class:'section-title'}, 'Checkpoint Diff'));
  const subtitle = el('div', {class:'model-subtitle', style:'margin-bottom:16px;'});
  subtitle.textContent = (stepA != null ? 'Step ' + stepA : cpA) + '  vs  ' + (stepB != null ? 'Step ' + stepB : cpB);
  wrap.appendChild(subtitle);

  // Summary chips
  const s = data.summary || {};
  const chips = el('div', {style:'display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;'});
  chips.innerHTML =
    '<span class="metric-chip" style="border-color:var(--green);">' + (s.improved||0) + ' improved</span>' +
    '<span class="metric-chip" style="border-color:var(--red);">' + (s.regressed||0) + ' regressed</span>' +
    '<span class="metric-chip" style="border-color:var(--muted);">' + (s.unchanged||0) + ' unchanged</span>';
  wrap.appendChild(chips);

  // Table
  const table = document.createElement('table');
  table.className = 'diff-table';
  let thead = '<thead><tr><th>Dataset</th><th>Score A (Step ' + (stepA||'?') + ')</th><th>Score B (Step ' + (stepB||'?') + ')</th><th>Delta</th><th>Significance</th></tr></thead>';
  let tbody = '<tbody>';
  for (const d of (data.datasets || [])) {
    const cls = d.delta > 0 ? 'diff-positive' : d.delta < 0 ? 'diff-negative' : 'diff-neutral';
    const deltaStr = d.delta != null ? (d.delta > 0 ? '+' : '') + d.delta.toFixed(4) : '\u2014';
    const sigLabel = d.significance === 'likely_real' ? '\u25CF real' : d.significance === 'likely_noise' ? '~ noise' : d.significance === 'uncertain' ? '? uncertain' : '\u2014';
    tbody += '<tr><td>' + d.dataset_name + '</td><td>' + (d.score_a != null ? d.score_a.toFixed(4) : '\u2014') + '</td><td>' + (d.score_b != null ? d.score_b.toFixed(4) : '\u2014') + '</td><td class="' + cls + '">' + deltaStr + '</td><td>' + sigLabel + '</td></tr>';
  }
  tbody += '</tbody>';
  table.innerHTML = thead + tbody;
  wrap.appendChild(table);
}

/* ===================================================================
   PROMOTION STATUS HELPER
   =================================================================== */
async function renderPromotionBadge(container, modelId) {
  try {
    const data = await api('/api/models/' + encodeURIComponent(modelId) + '/promotion-status');
    const badge = el('span', {class: 'promotion-badge ' + data.overall});
    if (data.overall === 'ready') badge.textContent = '\u2713 Promotion Ready';
    else if (data.overall === 'blocked') badge.textContent = '\u2717 Blocked';
    else if (data.overall === 'no_rules') badge.textContent = 'No promotion rules';
    else badge.textContent = 'No data';
    container.appendChild(badge);
    // Show rule details on hover
    if (data.rules && data.rules.length) {
      const details = el('div', {style:'margin-top: 8px; font-size: 12px; color: var(--muted);'});
      for (const r of data.rules) {
        const line = el('div', {style:'margin-bottom: 4px;'});
        const icon = r.passed ? '\u2713' : '\u2717';
        const color = r.passed ? 'var(--green)' : 'var(--red)';
        line.innerHTML = '<span style="color:' + color + ';">' + icon + '</span> ' + r.rule_name;
        if (r.failures && r.failures.length) {
          line.innerHTML += '<div style="margin-left:16px; color:var(--red); font-size:11px;">' + r.failures.join('<br>') + '</div>';
        }
        details.appendChild(line);
      }
      container.appendChild(details);
    }
  } catch(e) {}
}
